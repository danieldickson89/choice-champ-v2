<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <link rel="icon" href="/logo.png" type="image/png">
    <meta name="viewport" content="initial-scale=1, width=device-width, maximum-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#312E2E">
    <meta name="description" content="Choice Champ — pick what to watch, play, and beat together.">

    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="/manifest.json">

    <!--
      Notice the use of  in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.
      Unlike "/favicon.ico" or "favicon.ico", "/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Choice Champ</title>
    <link rel="apple-touch-icon" href="/img/icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
      /* Inline splash that paints before the React bundle hydrates,
         so first-load and PWA cold-start don't show a blank page.
         The script in src/index.jsx removes #cc-splash once React
         has rendered into #root. */
      html, body { background-color: #312E2E; }
      #cc-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #312E2E;
        transition: opacity 320ms ease-out;
      }
      #cc-splash.cc-splash-hide {
        opacity: 0;
        pointer-events: none;
      }
      #cc-splash img {
        width: 120px;
        height: 120px;
        animation: cc-splash-spin 2.4s linear infinite;
      }
      @keyframes cc-splash-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="cc-splash" aria-hidden="true">
      <img src="/logo.png" alt="" />
    </div>
    <div id="root"></div>

    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.
      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.
      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
